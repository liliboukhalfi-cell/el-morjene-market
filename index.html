<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FDF6EC; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #F5EBD8; }
::-webkit-scrollbar-thumb { background: #C4571A; border-radius: 99px; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@keyframes float {
  0%,100% { transform: translateY(0px) rotate(-2deg); }
  50%      { transform: translateY(-10px) rotate(-2deg); }
}
@keyframes slideInRight0 {
  0%   { opacity: 0; transform: translateX(64px) scale(0.97); }
  60%  { opacity: 1; }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes slideInRight1 {
  0%   { opacity: 0; transform: translateX(64px) scale(0.97); }
  60%  { opacity: 1; }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes slideInLeft0 {
  0%   { opacity: 0; transform: translateX(-64px) scale(0.97); }
  60%  { opacity: 1; }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes slideInLeft1 {
  0%   { opacity: 0; transform: translateX(-64px) scale(0.97); }
  60%  { opacity: 1; }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes addedStamp {
  0%   { transform: scale(1); }
  20%  { transform: scale(1.05); }
  60%  { transform: scale(0.98); }
  100% { transform: scale(1); }
}
@keyframes addedShine {
  0%   { box-shadow: 0 0 0 0 rgba(76,160,90,0.45); }
  70%  { box-shadow: 0 0 0 14px rgba(76,160,90,0); }
  100% { box-shadow: 0 0 0 0 rgba(76,160,90,0); }
}
button { font-family: inherit; }
input, textarea { font-family: inherit; }
.hidden { display: none; }
</style>
</head>
<body>
<div id="app" style="min-height:100vh; background:#FDF6EC; color:#2C1A0E; font-family:'Nunito',sans-serif;"></div>
<script src="js/app.js"></script>
</body>
</html>
